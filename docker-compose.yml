services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.virtualbarber.shop
    restart: unless-stopped

  webhook:
    build: ./webhook
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - ./scripts/deploy.sh:/hooks/deploy.sh:ro
      - ./webhook/hooks.json.tpl:/hooks/hooks.json.tpl:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/deploy/barbershop-chatbot:/home/deploy/barbershop-chatbot
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
